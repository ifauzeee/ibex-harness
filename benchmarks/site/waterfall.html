<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks — Waterfall</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
    <script src="./theme.js"></script>
  </head>
  <body data-page="waterfall" data-subtitle="Stage-level latency decomposition">
    <div id="site-header"></div>
    <main class="site-main">
      <div class="wrap">
        <div class="page-header">
          <h1>Pipeline Stage Waterfall</h1>
          <p>Synthetic stage microbenches and real proxy handler cost, normalized for comparison.</p>
        </div>
        <div class="toolbar">
          <button id="refreshBtn" class="btn" type="button">Refresh</button>
        </div>
        <div class="panel">
          <p class="panel-note">Values are microseconds per operation from Go benchmarks (lower is better).</p>
          <div class="chart-box"><canvas id="waterfallChart" aria-label="Stage waterfall chart"></canvas></div>
        </div>
      </div>
    </main>
    <script src="./shell.js"></script>
    <script src="./bench-common.js"></script>
    <script src="./bench-pages.js"></script>
    <script src="./charts.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
