<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks — Load</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
    <script src="./theme.js"></script>
  </head>
  <body data-page="load" data-subtitle="k6 load profile and SLO view">
    <div id="site-header"></div>
    <main class="site-main">
      <div class="wrap">
        <div class="page-header">
          <h1>k6 Load Metrics</h1>
          <p>End-to-end load against the real proxy <code>/health</code> endpoint on CI runners.</p>
        </div>
        <div class="toolbar">
          <span class="pill">Target p99 &lt; 20ms</span>
          <span class="pill">Target error &lt; 0.1%</span>
          <button id="refreshBtn" class="btn" type="button">Refresh</button>
        </div>
        <div class="panel">
          <h3>Latest run</h3>
          <div id="loadMetrics" class="metric-grid"></div>
        </div>
        <div class="panel">
          <h3>Latency distribution</h3>
          <div class="chart-box chart-box-sm"><canvas id="loadChart" aria-label="Load latency bar chart"></canvas></div>
        </div>
      </div>
    </main>
    <script src="./shell.js"></script>
    <script src="./bench-common.js"></script>
    <script src="./bench-pages.js"></script>
    <script src="./charts.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
