<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks — Trends</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
    <script src="./theme.js"></script>
  </head>
  <body data-page="trends" data-subtitle="Latency and throughput trends">
    <div id="site-header"></div>
    <main class="site-main">
      <div class="wrap">
        <div class="page-header">
          <h1>Latency &amp; Throughput Trends</h1>
          <p>Track p99 and allocation drift across the last benchmark runs.</p>
        </div>
        <div class="toolbar">
          <button id="refreshBtn" class="btn" type="button">Refresh</button>
          <button id="autorefreshBtn" class="btn btn-ghost" type="button">Auto Refresh: Off</button>
        </div>
        <div class="panel">
          <h3>Recent p99 trend</h3>
          <div class="chart-box"><canvas id="trendChart" aria-label="p99 latency trend chart"></canvas></div>
        </div>
        <div class="panel">
          <h3>Run history</h3>
          <table id="trendTable">
            <thead>
              <tr>
                <th>SHA</th><th>Time</th><th>p50</th><th>p95</th><th>p99</th><th>p99.9</th><th>req/s</th><th>allocs/op</th><th>B/op</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="./shell.js"></script>
    <script src="./bench-common.js"></script>
    <script src="./bench-pages.js"></script>
    <script src="./charts.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
