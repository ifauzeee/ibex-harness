<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks - Commits</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div class="brand">
          <div class="logo-wrap">
            <div class="logo">IB</div>
            <div>
              <strong>IBEX Harness</strong>
              <div class="muted">Run history and release confidence trail</div>
            </div>
          </div>
          <div class="status">History View</div>
        </div>
      </div>
      <nav>
        <a href="./index.html">Overview</a>
        <a href="./trends.html">Trends</a>
        <a href="./waterfall.html">Waterfall</a>
        <a href="./load.html">Load</a>
        <a href="./commits.html">Commits</a>
      </nav>
      <h1>Run History</h1>
      <div class="toolbar">
        <label for="shaFilter" class="sr-only">Filter by SHA prefix</label>
        <input id="shaFilter" class="btn" type="text" placeholder="Filter by SHA prefix..." aria-label="Filter by SHA prefix" />
      </div>
      <div class="panel">
        <table id="runs">
          <thead>
            <tr><th>SHA</th><th>Time</th><th>Branch</th><th>p99</th><th>Allocs</th><th>Error</th><th>Run</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
