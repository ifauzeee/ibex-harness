<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks — Commits</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js"></script>
  </head>
  <body data-page="commits" data-subtitle="Run history and release confidence">
    <div id="site-header"></div>
    <main class="site-main">
      <div class="wrap">
        <div class="page-header">
          <h1>Run History</h1>
          <p>Filter by commit SHA and inspect regression signals across branches.</p>
        </div>
        <div class="toolbar">
          <label for="shaFilter" class="sr-only">Filter by SHA prefix</label>
          <input id="shaFilter" class="btn" type="text" placeholder="Filter by SHA prefix…" aria-label="Filter by SHA prefix" />
          <button id="refreshBtn" class="btn btn-ghost" type="button">Refresh</button>
        </div>
        <div class="panel">
          <table id="runs">
            <thead>
              <tr><th>SHA</th><th>Time</th><th>Branch</th><th>p99</th><th>Allocs</th><th>Error</th><th>Run</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="./shell.js"></script>
    <script src="./bench-common.js"></script>
    <script src="./bench-pages.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
