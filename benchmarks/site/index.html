<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBEX Benchmarks — Overview</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js"></script>
  </head>
  <body data-page="overview" data-subtitle="Performance intelligence dashboard">
    <div id="site-header"></div>
    <main class="site-main">
      <div class="wrap">
        <div class="page-header">
          <div class="toolbar" style="margin-top:0;justify-content:space-between;">
            <div>
              <h1>Benchmark Overview</h1>
              <p>Continuous proxy load, real handler microbenches, and synthetic stage decomposition.</p>
            </div>
            <span id="healthBadge" class="status-badge">Loading</span>
          </div>
        </div>
        <div class="toolbar">
          <button id="refreshBtn" class="btn" type="button">Refresh</button>
          <button id="autorefreshBtn" class="btn btn-ghost" type="button">Auto Refresh: Off</button>
          <span id="lastUpdated" class="pill">Last updated: n/a</span>
        </div>
        <div id="empty" class="empty" style="display:none;">No benchmark data yet. Run the benchmark workflow on main.</div>
        <div id="content">
          <div id="kpis" class="grid"></div>
          <div id="meta" class="panel"></div>
          <div class="panel">
            <h3>Stage decomposition</h3>
            <p class="panel-note">Synthetic pipeline stages (µs) plus real proxy <code>/health</code> handler bench.</p>
            <ul id="stages" class="stages"></ul>
          </div>
        </div>
      </div>
    </main>
    <script src="./shell.js"></script>
    <script src="./bench-common.js"></script>
    <script src="./bench-pages.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
