repos:
  - repo: local
    hooks:
      - id: repo-guards
        name: repo guards
        entry: bash .github/scripts/check-repo-layout.sh
        language: system
        pass_filenames: false

      - id: markdownlint
        name: markdownlint
        entry: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
        language: system
        pass_filenames: false

      - id: gitleaks-optional
        name: gitleaks optional local scan
        entry: bash -c 'if command -v gitleaks >/dev/null 2>&1; then gitleaks detect --source . --config .gitleaks.toml --redact; else echo "gitleaks not installed; skipping local secret scan (CI still runs gitleaks)"; fi'
        language: system
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.3
    hooks:
      - id: gitleaks
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.52.2
    hooks:
      - id: golangci-lint
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
