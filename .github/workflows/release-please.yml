name: Version Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: version-release-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  propose-version-release-pr:
    name: propose-version-release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Propose changelog and version bump PR
        id: release_please
        continue-on-error: true
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Report version release PR status
        if: always()
        run: |
          if [ "${{ steps.release_please.outcome }}" = "success" ]; then
            echo "Release Please updated or created the version bump PR." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Version release PR not created
          Release Please could not open or update the version bump PR.
          Enable **Settings → Actions → General → Workflow permissions → Allow GitHub Actions to create and approve pull requests**,
          or add a `RELEASE_PLEASE_TOKEN` repository secret with `contents` and `pull-requests` scope.
          EOF
          exit 0
