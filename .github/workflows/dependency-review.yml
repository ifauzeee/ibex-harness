# Dependency Review Action
#
# Surfaces known-vulnerable dependency changes on PRs that touch lockfiles or go.mod.
name: Dependency Review

on:
  pull_request:

# SonarQube S8264: declare permissions per job, not at workflow scope.
permissions: {}

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deps: ${{ steps.detect.outputs.deps }}
      run_security: ${{ steps.detect.outputs.run_security }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-changes
        with:
          fetch-depth: '0'

  dependency-review:
    name: dependency-review
    needs: changes
    if: needs.changes.outputs.deps == 'true' || needs.changes.outputs.run_security == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
