name: Web Deploy

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-web-pages
    if: github.event_name == 'workflow_call' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://ibexharness.com
    env:
      NEXT_PUBLIC_SITE_URL: https://ibexharness.com
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm-web

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'web/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Typecheck web app
        run: pnpm --filter web typecheck

      # Hard cap: Vitest forks-pool hangs have blocked deploy for 10+ minutes.
      - name: Test web components
        timeout-minutes: 3
        run: pnpm --filter web test

      - name: Build web app (static export)
        run: pnpm --filter web build:clean

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler pages project create ibex-harness-docs --production-branch=main 2>/dev/null || true

      - name: Verify Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Prefer Pages projects list: account-scoped Pages tokens often fail
          # GET /user/tokens/verify even when Wrangler deploy works.
          body="$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" || true)"
          if ! echo "$body" | jq -e '.success == true' >/dev/null 2>&1; then
            echo "::error::CLOUDFLARE_API_TOKEN failed Pages API check (Auth error 10000)."
            echo "Update the production environment secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID"
            echo "(Custom Token: Account→Cloudflare Pages:Edit). See ibex-r/cloudflare-pages-token-setup.md"
            echo "Response: $body"
            exit 1
          fi
          echo "Cloudflare API token verified (Pages projects list OK)"

      - name: Deploy to Cloudflare Pages
        id: deploy
        timeout-minutes: 15
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler pages deploy web/out \
            --project-name=ibex-harness-docs \
            --branch=main \
            --commit-dirty=true 2>&1 | tee deploy.log
          BASE_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' deploy.log | tail -1)
          if [ -z "$BASE_URL" ]; then
            echo "Could not parse pages.dev URL from deploy output"
            if grep -q 'Authentication error' deploy.log; then
              echo "::error::Wrangler auth failed. Rotate CLOUDFLARE_API_TOKEN (ibex-r/cloudflare-pages-token-setup.md)."
            fi
            exit 1
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed Pages preview
        run: bash "$GITHUB_WORKSPACE/.github/scripts/web-smoke.sh" "${{ steps.deploy.outputs.base_url }}"
