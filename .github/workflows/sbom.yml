name: SBOM

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

env:
  GRYPE_VERSION: "0.115.0"

jobs:
  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90

      - name: Install Grype and update vulnerability DB
        run: |
          GRYPE_ARCHIVE="grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o "${GRYPE_ARCHIVE}" \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/${GRYPE_ARCHIVE}"
          curl -sSfL -o checksums.txt \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt"
          grep " ${GRYPE_ARCHIVE}$" checksums.txt | sha256sum -c -
          tar -xzf "${GRYPE_ARCHIVE}" -C /usr/local/bin grype
          grype version
          ok=0
          for i in 1 2 3; do
            if grype db update; then
              ok=1
              break
            fi
            if [ "$i" -lt 3 ]; then
              sleep 10
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "grype db update failed after 3 attempts" >&2
            exit 1
          fi

      - name: Scan SBOM with Grype
        run: |
          grype sbom:sbom.spdx.json --fail-on critical -o table > grype-report.txt
          grype sbom:sbom.spdx.json --fail-on critical -o json > grype-report.json

      - name: Upload Grype report artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sbom-scan
          path: |
            grype-report.txt
            grype-report.json
          retention-days: 90
