name: SBOM

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90

      - name: Install Grype and update vulnerability DB
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version
          grype db update

      - name: Scan SBOM with Grype
        run: |
          grype sbom:sbom.spdx.json --fail-on critical -o table > grype-report.txt
          grype sbom:sbom.spdx.json --fail-on critical -o json > grype-report.json

      - name: Upload Grype report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: grype-sbom-scan
          path: |
            grype-report.txt
            grype-report.json
          retention-days: 90
