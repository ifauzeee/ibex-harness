name: Docker Publish

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag (e.g. latest or v1.0.0)
        required: true
        default: latest
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: resolve-tag
    if: |
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      push_latest: ${{ steps.meta.outputs.push_latest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve and validate image tag
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          case "${{ github.event_name }}" in
            workflow_call|workflow_dispatch)
              tag="${INPUT_IMAGE_TAG}"
              ;;
            workflow_run)
              tag="latest"
              ;;
            *)
              echo "unsupported event: ${{ github.event_name }}"
              exit 1
              ;;
          esac

          case "${tag}" in
            latest|v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "invalid image tag: ${tag}"
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [[ "${tag}" == "latest" ]] || [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi

  build-auth:
    name: build-auth
    needs: resolve-tag
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        run: |
          cd packages/proto
          buf generate
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Build auth image artifact
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: services/auth/Dockerfile
          platforms: linux/amd64
          push: false
          outputs: type=docker,dest=/tmp/auth.tar
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth
      - name: Upload auth OCI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oci-auth
          path: /tmp/auth.tar
          retention-days: 1

  build-proxy:
    name: build-proxy
    needs: resolve-tag
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        run: |
          cd packages/proto
          buf generate
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Build proxy image artifact
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: services/proxy/Dockerfile
          platforms: linux/amd64
          push: false
          outputs: type=docker,dest=/tmp/proxy.tar
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy
      - name: Upload proxy OCI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oci-proxy
          path: /tmp/proxy.tar
          retention-days: 1

  scan-image-auth:
    name: scan-image-auth
    needs: build-auth
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download auth OCI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oci-auth
          path: /tmp
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.3.0
        with:
          version: v0.70.0
      - name: Scan auth image with Trivy
        run: |
          trivy image --input /tmp/auth.tar \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image-auth.sarif \
            --exit-code 1
      - name: Upload Trivy auth SARIF
        if: always() && hashFiles('trivy-image-auth.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image-auth.sarif
          category: trivy-image-auth

  scan-image-proxy:
    name: scan-image-proxy
    needs: build-proxy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download proxy OCI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oci-proxy
          path: /tmp
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.3.0
        with:
          version: v0.70.0
      - name: Scan proxy image with Trivy
        run: |
          trivy image --input /tmp/proxy.tar \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image-proxy.sarif \
            --exit-code 1
      - name: Upload Trivy proxy SARIF
        if: always() && hashFiles('trivy-image-proxy.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image-proxy.sarif
          category: trivy-image-proxy

  push-auth:
    name: push-auth
    needs: [resolve-tag, scan-image-auth]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        run: |
          cd packages/proto
          buf generate
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve push tags
        id: tags
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          PUSH_LATEST: ${{ needs.resolve-tag.outputs.push_latest }}
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          tags="ghcr.io/${repo_lc}/auth:${IMAGE_TAG}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            tags="${tags}"$'\n'"ghcr.io/${repo_lc}/auth:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push auth image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: services/auth/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  push-proxy:
    name: push-proxy
    needs: [resolve-tag, scan-image-proxy]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        run: |
          cd packages/proto
          buf generate
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve push tags
        id: tags
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          PUSH_LATEST: ${{ needs.resolve-tag.outputs.push_latest }}
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          tags="ghcr.io/${repo_lc}/proxy:${IMAGE_TAG}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            tags="${tags}"$'\n'"ghcr.io/${repo_lc}/proxy:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push proxy image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: services/proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

  attest-provenance:
    name: attest-provenance
    needs: [push-auth, push-proxy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Resolve repository path
        id: repo_meta
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest auth image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ steps.repo_meta.outputs.repo_lc }}/auth
          subject-digest: ${{ needs.push-auth.outputs.digest }}
          push-to-registry: true

      - name: Attest proxy image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ steps.repo_meta.outputs.repo_lc }}/proxy
          subject-digest: ${{ needs.push-proxy.outputs.digest }}
          push-to-registry: true
