name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: Run the full CI matrix regardless of path filters
        required: false
        default: false
        type: boolean

# SonarQube S8264: declare permissions per job, not at workflow scope.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  repo-guards:
    name: repo-guards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Forbid merge conflict markers
        run: |
          if git grep -n '^<<<<<<< \|^=======\|^>>>>>>> ' -- ':!*.md' 2>/dev/null; then
            echo "Merge conflict markers found"
            exit 1
          fi

      - name: Forbid committed .env files
        run: |
          if git ls-files '*.env' ':!:.env.example' ':!:**/.env.example' | grep -q .; then
            echo "Committed .env files are not allowed"
            git ls-files '*.env'
            exit 1
          fi
          if find . -name '.env' -not -path './.git/*' | grep -q .; then
            echo "Working tree contains .env"
            find . -name '.env' -not -path './.git/*'
            exit 1
          fi

      - name: Forbid large files (>5MB)
        run: |
          MAX=5242880
          found=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            size=$(wc -c < "$f" | tr -d ' ')
            if [ "$size" -gt "$MAX" ]; then
              echo "Large file: $f ($size bytes)"
              found=1
            fi
          done < <(git ls-files)
          [ "$found" -eq 0 ] || exit 1

      - name: Repo layout guard
        run: bash .github/scripts/check-repo-layout.sh

      - name: Landing hero assets guard
        run: bash .github/scripts/check-landing-assets.sh

      - name: Static export guards
        run: bash .github/scripts/check-static-export.sh

      - name: Validate action pins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/validate-action-pins.sh

      - name: Require DCO Signed-off-by on PR commits
        if: github.event_name == 'pull_request'
        run: bash .github/scripts/check-dco-signoff.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go: ${{ steps.detect.outputs.go }}
      web: ${{ steps.detect.outputs.web }}
      proto: ${{ steps.detect.outputs.proto }}
      docker: ${{ steps.detect.outputs.docker }}
      workflows: ${{ steps.detect.outputs.workflows }}
      deps: ${{ steps.detect.outputs.deps }}
      benchmarks: ${{ steps.detect.outputs.benchmarks }}
      docs: ${{ steps.detect.outputs.docs }}
      compose: ${{ steps.detect.outputs.compose }}
      full: ${{ steps.detect.outputs.full }}
      run_go: ${{ steps.detect.outputs.run_go }}
      run_web: ${{ steps.detect.outputs.run_web }}
      run_security: ${{ steps.detect.outputs.run_security }}
      run_docker: ${{ steps.detect.outputs.run_docker }}
      run_compose: ${{ steps.detect.outputs.run_compose }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ github.event_name == 'push' && '2' || '0' }}
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-changes
        with:
          fetch-depth: ${{ github.event_name == 'push' && '2' || '0' }}
          force-full: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full == true }}

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2

  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Full-repo scan: gitleaks-action uses $BASE^..$HEAD, which fails when BASE is the root commit.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  go-mod-tidy:
    name: go-mod-tidy
    needs: changes
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run shellcheck on repository shell scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find .github/scripts infra/scripts -name '*.sh' -print0 | xargs -0 shellcheck -S error

  buf-lint:
    name: buf-lint
    needs: [changes, repo-guards]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: buf lint
        working-directory: packages/proto
        run: buf lint

  buf-breaking:
    name: buf-breaking
    needs: [changes, buf-lint]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-buf
      - name: buf breaking (informational)
        working-directory: packages/proto
        run: |
          git fetch origin main --depth=1
          if git cat-file -e "FETCH_HEAD:packages/proto/buf.yaml" 2>/dev/null; then
            buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=packages/proto"
          else
            echo "Skipping buf breaking: no proto baseline on main yet (initial proto import)"
          fi

  proto-contract:
    name: proto-contract
    needs: [changes, buf-lint]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate stubs (ephemeral; not committed)
        working-directory: packages/proto
        run: buf generate
      - name: Contract unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proto-contract-unit.xml -- \
            -count=1 ./packages/proto/...
      - name: Upload test results to Trunk (proto-contract-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proto-contract-unit.xml
          variant: proto-contract-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Contract integration tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proto-contract-integration.xml -- \
            -tags=integration -count=1 ./packages/proto/...
      - name: Upload test results to Trunk (proto-contract-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proto-contract-integration.xml
          variant: proto-contract-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Assert gen/ is not tracked
        run: |
          if git status --porcelain packages/proto/gen 2>/dev/null | grep -q .; then
            echo "packages/proto/gen/ must not be committed"
            git status --porcelain packages/proto/gen
            exit 1
          fi
          if git ls-files packages/proto/gen | grep -q .; then
            echo "packages/proto/gen/ must not be tracked in git"
            git ls-files packages/proto/gen
            exit 1
          fi

  compose-validate:
    name: compose-validate
    needs: changes
    if: needs.changes.outputs.run_compose == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate dev compose
        run: docker compose -f infra/compose/dev/docker-compose.yml --env-file infra/compose/dev/.env.example config
      - name: Validate test compose
        run: docker compose -f infra/compose/test/docker-compose.yml config

  db-migrate-smoke:
    name: db-migrate-smoke
    needs: [changes, repo-guards]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - name: Unit tests (migrations package)
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/db-migrate-unit.xml -- \
            -count=1 ./infra/migrations/postgres/...
      - name: Upload test results to Trunk (db-migrate-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/db-migrate-unit.xml
          variant: db-migrate-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Migrate up twice (idempotent)
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          go run ./infra/migrations/postgres/cmd/migrate -command up
          go run ./infra/migrations/postgres/cmd/migrate -command up
          go run ./infra/migrations/postgres/cmd/migrate -command version
      - name: Integration tests (RLS, schema)
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/db-migrate-integration.xml -- \
            -tags=integration -count=1 ./infra/migrations/postgres/...
      - name: Upload test results to Trunk (db-migrate-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/db-migrate-integration.xml
          variant: db-migrate-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  auth-validate-smoke:
    name: auth-validate-smoke
    needs: [changes, proto-contract, db-migrate-smoke]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Auth unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/auth-smoke-unit.xml -- \
            -count=1 ./services/auth/...
      - name: Upload test results to Trunk (auth-smoke-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/auth-smoke-unit.xml
          variant: auth-smoke-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Auth integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/auth-smoke-integration.xml -- \
            -tags=integration -count=1 ./services/auth/...
      - name: Upload test results to Trunk (auth-smoke-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/auth-smoke-integration.xml
          variant: auth-smoke-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  proxy-auth-smoke:
    name: proxy-auth-smoke
    needs: [changes, proto-contract, db-migrate-smoke]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Proxy unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-auth-unit.xml -- \
            -count=1 ./services/proxy/...
      - name: Upload test results to Trunk (proxy-auth-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-auth-unit.xml
          variant: proxy-auth-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Proxy auth integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-auth-integration.xml -- \
            -tags=integration -count=1 -p 1 ./services/proxy/...
      - name: Upload test results to Trunk (proxy-auth-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-auth-integration.xml
          variant: proxy-auth-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  proxy-agent-verify-smoke:
    name: proxy-agent-verify-smoke
    needs: [changes, proto-contract, db-migrate-smoke]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Proxy agent verification unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-agent-verify-unit.xml -- \
            -count=1 ./services/proxy/internal/http/ -run '^TestAgentVerification'
      - name: Upload test results to Trunk (proxy-agent-verify-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-agent-verify-unit.xml
          variant: proxy-agent-verify-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Proxy agent verification integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          count=$(go test -tags=integration -list '^TestSecurity_SEC[23]_' ./services/proxy | grep -c '^TestSecurity_SEC' || true)
          if [ "$count" -lt 10 ]; then
            echo "expected at least 10 SEC-2/SEC-3 tests, found $count"
            exit 1
          fi
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-agent-verify-integration.xml -- \
            -tags=integration -count=1 ./services/proxy/ -run '^TestSecurity_SEC[23]_'
      - name: Upload test results to Trunk (proxy-agent-verify-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-agent-verify-integration.xml
          variant: proxy-agent-verify-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  security-integration:
    name: security-integration
    needs: [changes, proto-contract, db-migrate-smoke]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Phase 1 security integration suite (M1.5.1)
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          count=$(go test -tags=integration -list '^TestSecurity_' ./services/proxy | grep -c '^TestSecurity_' || true)
          if [ "$count" -lt 28 ]; then
            echo "expected at least 28 TestSecurity_* tests, found $count"
            exit 1
          fi
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/security-integration.xml -- \
            -tags=integration -timeout=120s -count=1 -v ./services/proxy -run '^TestSecurity_'
      - name: Upload test results to Trunk (security-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/security-integration.xml
          variant: security-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  go-race:
    name: go-race
    needs: [changes, proto-contract]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Race detector (unit tests)
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/go-race.xml -- \
            -race -timeout=120s -count=1 ./packages/... ./services/auth/... ./services/proxy/...
      - name: Upload test results to Trunk (go-race)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/go-race.xml
          variant: go-race
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  go-services:
    name: go-services
    needs: [changes, proto-contract]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        service: [auth, proxy]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: gofmt check
        run: |
          if ! find "services/${{ matrix.service }}" -name '*.go' -print -quit | grep -q .; then
            echo "No Go files found"
            exit 1
          fi
          unformatted="$(find "services/${{ matrix.service }}" -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: go test
        run: |
          bash infra/scripts/go-test-gotestsum.sh "test-results/junit/go-services-${{ matrix.service }}.xml" -- \
            -count=1 ./services/${{ matrix.service }}/...
      - name: Upload test results to Trunk (go-services)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/go-services-${{ matrix.service }}.xml
          variant: go-services-${{ matrix.service }}
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: go build
        run: go build -o /dev/null ./services/${{ matrix.service }}/cmd/${{ matrix.service }}

  golangci-lint:
    name: golangci-lint
    needs: [changes, proto-contract]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs for auth
        working-directory: packages/proto
        run: buf generate
      - name: Install golangci-lint
        run: |
          GOLANGCI_LINT_VERSION=2.8.0
          GOLANGCI_LINT_ARCHIVE="golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz"
          curl -sSfL -o "${GOLANGCI_LINT_ARCHIVE}" \
            "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/${GOLANGCI_LINT_ARCHIVE}"
          curl -sSfL -o checksums.txt \
            "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/golangci-lint-${GOLANGCI_LINT_VERSION}-checksums.txt"
          grep " ${GOLANGCI_LINT_ARCHIVE}$" checksums.txt | sha256sum -c -
          tar -xzf "${GOLANGCI_LINT_ARCHIVE}" -C /usr/local/bin --strip-components=1 \
            "golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint"
          golangci-lint --version
      - name: Run golangci-lint
        run: |
          golangci-lint run ./packages/... ./services/auth/... ./services/proxy/...

  go-fuzz:
    name: go-fuzz
    needs: changes
    if: needs.changes.outputs.run_go == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Run Go fuzz smoke (chat request parser)
        run: go test -fuzz=FuzzParseChatCompletionRequest -fuzztime=30s ./services/proxy/internal/llm/

  trivy:
    name: trivy
    needs: changes
    if: needs.changes.outputs.run_security == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  osv-scan:
    name: osv-scan
    needs: changes
    if: github.event_name != 'schedule' && needs.changes.outputs.run_security == 'true'
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # OSV scans JS lockfiles only. Go module vulnerabilities are enforced by
      # the govulncheck job (reachable-code analysis). GO-2026-5932 is a
      # module-level openpgp advisory with no fixed version; OSV flags
      # golang.org/x/crypto even when only argon2 is imported and call analysis
      # cannot mark it unexecuted. See ADR-0008.
      scan-args: |-
        --lockfile
        pnpm-lock.yaml

  web-build:
    name: web-build
    needs: [changes, repo-guards]
    if: needs.changes.outputs.run_web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Overlay PR benchmark artifact
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          run_id=""
          if ! run_id="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow benchmark.yml \
            --commit "${HEAD_SHA}" \
            --json databaseId,conclusion \
            --jq '[.[] | select(.conclusion == "success")] | first | .databaseId // empty' 2>/dev/null)"; then
            echo "Benchmark overlay lookup failed for ${HEAD_SHA}; using committed benchmark JSON."
            exit 0
          fi
          if [ -z "$run_id" ]; then
            echo "No successful Benchmarks run for ${HEAD_SHA}; using committed benchmark JSON."
            exit 0
          fi
          mkdir -p web/public/benchmarks
          if ! gh run download "$run_id" \
            --repo "${GITHUB_REPOSITORY}" \
            --name benchmark-data \
            --dir /tmp/benchmark-data; then
            echo "Benchmark artifact download failed for run ${run_id}; using committed benchmark JSON."
            exit 0
          fi
          cp /tmp/benchmark-data/benchmark-data.json web/public/benchmarks/benchmark-data.json
          if [ -f /tmp/benchmark-data/badge.svg ]; then
            cp /tmp/benchmark-data/badge.svg web/public/benchmarks/badge.svg
          fi
          echo "Overlaid benchmark artifact from run ${run_id}"

      - uses: ./.github/actions/setup-pnpm-web

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'web/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Typecheck web app
        run: pnpm --filter web typecheck

      - name: Test web components
        run: pnpm --filter web test

      - name: Build web app
        run: pnpm web:build:clean

  hadolint:
    name: hadolint
    needs: changes
    if: needs.changes.outputs.run_docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Hadolint all Dockerfiles
        run: |
          # Dockerfiles today: services/auth, services/proxy.
          # Pending: services/memory, services/dashboard (see web/engineering/DEPENDENCIES.md §10).
          mapfile -t files < <(find . -name 'Dockerfile*' -not -path './.git/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Dockerfiles found"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Linting $f"
            docker run --rm -i \
              -v "${GITHUB_WORKSPACE}:/workdir" \
              -w /workdir \
              hadolint/hadolint:v2.12.0 \
              hadolint -f tty --config .hadolint.yaml "$f"
          done

  coverage:
    name: coverage
    needs: [changes, proto-contract, db-migrate-smoke]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
      POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Go unit coverage
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/coverage-unit.xml -- \
            -count=1 -coverprofile=coverage-go-unit.out \
            ./packages/... ./services/auth/... ./services/proxy/...
      - name: Upload test results to Trunk (coverage-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/coverage-unit.xml
          variant: coverage-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Go integration coverage
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/coverage-integration.xml -- \
            -tags=integration -count=1 -p 1 -coverprofile=coverage-go-integration.out \
            ./packages/... ./services/auth/... ./services/proxy/... ./infra/...
      - name: Upload test results to Trunk (coverage-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/coverage-integration.xml
          variant: coverage-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Merge coverage profiles
        run: |
          go run github.com/wadey/gocovmerge@v0.0.0-20160331181800-b5bfa59ec0ad \
            coverage-go-unit.out coverage-go-integration.out > coverage-go-merged.out
          bash infra/scripts/coverage-filter.sh coverage-go-merged.out coverage-go-handwritten.out
          go tool cover -func=coverage-go-handwritten.out | tail -1
      - name: Coverage gate
        run: bash infra/scripts/coverage-gate.sh coverage-go-merged.out
      - name: Upload coverage reports to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-go-handwritten.out,coverage-go-unit.out,coverage-go-integration.out
          flags: go,unit,integration
          fail_ci_if_error: false

  bandit:
    name: bandit
    needs: changes
    if: needs.changes.outputs.run_security == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Bandit (memory service)
        id: bandit
        run: |
          if [ ! -d services/memory ]; then
            echo "services/memory not present — skipping bandit until Python memory service lands"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip install --disable-pip-version-check --no-cache-dir \
            --require-hashes \
            -r .github/requirements/bandit.txt
          bandit -r services/memory/ -x tests/,test_ -f sarif -o bandit.sarif
          echo "run=true" >> "$GITHUB_OUTPUT"
      - name: Bandit skipped summary
        if: steps.bandit.outputs.run != 'true'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Bandit (Python) skipped

          This repository currently does not have `services/memory/` checked in, so the Bandit scan is intentionally skipped.

          - **Why**: Bandit is scoped to the Python memory service to avoid scanning unrelated paths.
          - **Effect**: `bandit.sarif` is not generated, so the “Upload Bandit SARIF” step is skipped as well.
          - **Enables automatically**: Once `services/memory/` exists in the repo, Bandit will run and upload SARIF to Code Scanning.
          EOF
          printf "Bandit skipped: services/memory not present\n" > bandit-skip.txt
      - name: Upload Bandit skip note
        if: steps.bandit.outputs.run != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bandit-skip
          path: bandit-skip.txt
          retention-days: 7
      - name: Upload Bandit SARIF
        if: steps.bandit.outputs.run == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: bandit.sarif
          category: bandit

  web-go-quality-gate:
    name: web-go-quality-gate
    needs:
      - changes
      - proto-contract
      - golangci-lint
      - security-integration
      - coverage
      - proxy-auth-smoke
      - go-race
      - go-services
      - auth-validate-smoke
      - proxy-agent-verify-smoke
      - govulncheck
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.run_web == 'true' &&
      needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "Go quality gates passed for web deploy"

  web-deploy:
    name: web-deploy
    needs:
      - changes
      - repo-guards
      - web-build
      - web-go-quality-gate
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.run_web == 'true' &&
      needs.repo-guards.result == 'success' &&
      needs.web-build.result == 'success' &&
      (needs.changes.outputs.run_go != 'true' || needs.web-go-quality-gate.result == 'success')
    permissions:
      contents: read
    uses: ./.github/workflows/web-deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  govulncheck:
    name: govulncheck
    needs: [changes, proto-contract]
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck
        run: |
          govulncheck ./packages/... ./services/auth/... ./services/proxy/...

  license-check:
    name: license-check
    needs: changes
    if: needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-buf
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - name: Verify dependency licenses
        run: |
          go-licenses check ./packages/... ./services/auth/... ./services/proxy/... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,Unicode-DFS-2016,MPL-2.0

  ci-gate-repo:
    name: ci-gate-repo
    needs:
      - changes
      - repo-guards
      - shellcheck
      - markdown
      - compose-validate
      - go-mod-tidy
      - license-check
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Evaluate repo gate
        run: |
          bash .github/scripts/evaluate-ci-gate.sh true \
            "${{ needs.repo-guards.result }}" \
            "${{ needs.shellcheck.result }}" \
            "${{ needs.markdown.result }}" \
            "${{ needs.compose-validate.result }}" \
            "${{ needs.go-mod-tidy.result }}" \
            "${{ needs.license-check.result }}"

  ci-gate-go:
    name: ci-gate-go
    needs:
      - changes
      - buf-lint
      - proto-contract
      - db-migrate-smoke
      - auth-validate-smoke
      - proxy-auth-smoke
      - proxy-agent-verify-smoke
      - security-integration
      - go-race
      - go-services
      - golangci-lint
      - coverage
      - govulncheck
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Evaluate Go gate
        run: |
          bash .github/scripts/evaluate-ci-gate.sh "${{ needs.changes.outputs.run_go }}" \
            "${{ needs.buf-lint.result }}" \
            "${{ needs.proto-contract.result }}" \
            "${{ needs.db-migrate-smoke.result }}" \
            "${{ needs.auth-validate-smoke.result }}" \
            "${{ needs.proxy-auth-smoke.result }}" \
            "${{ needs.proxy-agent-verify-smoke.result }}" \
            "${{ needs.security-integration.result }}" \
            "${{ needs.go-race.result }}" \
            "${{ needs.go-services.result }}" \
            "${{ needs.golangci-lint.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.govulncheck.result }}"

  ci-gate-web:
    name: ci-gate-web
    needs:
      - changes
      - web-build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Evaluate web gate
        run: |
          bash .github/scripts/evaluate-ci-gate.sh "${{ needs.changes.outputs.run_web }}" \
            "${{ needs.web-build.result }}"

  ci-gate-security:
    name: ci-gate-security
    needs:
      - changes
      - trivy
      - osv-scan
      - bandit
      - hadolint
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Evaluate security gate
        run: |
          bash .github/scripts/evaluate-ci-gate.sh "${{ needs.changes.outputs.run_security }}" \
            "${{ needs.trivy.result }}" \
            "${{ needs.osv-scan.result }}" \
            "${{ needs.bandit.result }}" \
            "${{ needs.hadolint.result }}"
