name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-guards:
    name: repo-guards
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Forbid merge conflict markers
        run: |
          if git grep -n '^<<<<<<< \|^=======\|^>>>>>>> ' -- ':!*.md' 2>/dev/null; then
            echo "Merge conflict markers found"
            exit 1
          fi

      - name: Forbid committed .env files
        run: |
          if git ls-files '*.env' ':!:.env.example' ':!:**/.env.example' | grep -q .; then
            echo "Committed .env files are not allowed"
            git ls-files '*.env'
            exit 1
          fi
          if find . -name '.env' -not -path './.git/*' | grep -q .; then
            echo "Working tree contains .env"
            find . -name '.env' -not -path './.git/*'
            exit 1
          fi

      - name: Forbid large files (>5MB)
        run: |
          MAX=5242880
          found=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            size=$(wc -c < "$f" | tr -d ' ')
            if [ "$size" -gt "$MAX" ]; then
              echo "Large file: $f ($size bytes)"
              found=1
            fi
          done < <(git ls-files)
          [ "$found" -eq 0 ] || exit 1

      - name: Repo layout guard
        run: bash .github/scripts/check-repo-layout.sh

  markdown:
    name: markdownlint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  secrets:
    name: gitleaks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Full-repo scan: gitleaks-action uses $BASE^..$HEAD, which fails when BASE is the root commit.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  buf-lint:
    name: buf-lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf lint and breaking
        working-directory: packages/proto
        run: |
          buf lint
          if git cat-file -e "main:packages/proto/buf.yaml" 2>/dev/null; then
            buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=packages/proto"
          else
            echo "Skipping buf breaking: no proto baseline on main yet (initial proto import)"
          fi

  proto-contract:
    name: proto-contract
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate stubs (ephemeral; not committed)
        working-directory: packages/proto
        run: buf generate
      - name: Contract unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proto-contract-unit.xml -- \
            -count=1 ./packages/proto/...
      - name: Upload test results to Trunk (proto-contract-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proto-contract-unit.xml
          variant: proto-contract-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Contract integration tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proto-contract-integration.xml -- \
            -tags=integration -count=1 ./packages/proto/...
      - name: Upload test results to Trunk (proto-contract-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proto-contract-integration.xml
          variant: proto-contract-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Assert gen/ is not tracked
        run: |
          if git status --porcelain packages/proto/gen 2>/dev/null | grep -q .; then
            echo "packages/proto/gen/ must not be committed"
            git status --porcelain packages/proto/gen
            exit 1
          fi
          if git ls-files packages/proto/gen | grep -q .; then
            echo "packages/proto/gen/ must not be tracked in git"
            git ls-files packages/proto/gen
            exit 1
          fi

  compose-validate:
    name: compose-validate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate dev compose
        run: docker compose -f infra/compose/dev/docker-compose.yml --env-file infra/compose/dev/.env.example config
      - name: Validate test compose
        run: docker compose -f infra/compose/test/docker-compose.yml config

  db-migrate-smoke:
    name: db-migrate-smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - name: Unit tests (migrations package)
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/db-migrate-unit.xml -- \
            -count=1 ./infra/migrations/postgres/...
      - name: Upload test results to Trunk (db-migrate-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/db-migrate-unit.xml
          variant: db-migrate-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Migrate up twice (idempotent)
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          go run ./infra/migrations/postgres/cmd/migrate -command up
          go run ./infra/migrations/postgres/cmd/migrate -command up
          go run ./infra/migrations/postgres/cmd/migrate -command version
      - name: Integration tests (RLS, schema)
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/db-migrate-integration.xml -- \
            -tags=integration -count=1 ./infra/migrations/postgres/...
      - name: Upload test results to Trunk (db-migrate-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/db-migrate-integration.xml
          variant: db-migrate-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  auth-validate-smoke:
    name: auth-validate-smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Auth unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/auth-smoke-unit.xml -- \
            -count=1 ./services/auth/...
      - name: Upload test results to Trunk (auth-smoke-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/auth-smoke-unit.xml
          variant: auth-smoke-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Auth integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/auth-smoke-integration.xml -- \
            -tags=integration -count=1 ./services/auth/...
      - name: Upload test results to Trunk (auth-smoke-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/auth-smoke-integration.xml
          variant: auth-smoke-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  proxy-auth-smoke:
    name: proxy-auth-smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Proxy unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-auth-unit.xml -- \
            -count=1 ./services/proxy/...
      - name: Upload test results to Trunk (proxy-auth-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-auth-unit.xml
          variant: proxy-auth-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Proxy auth integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-auth-integration.xml -- \
            -tags=integration -count=1 -p 1 ./services/proxy/...
      - name: Upload test results to Trunk (proxy-auth-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-auth-integration.xml
          variant: proxy-auth-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  proxy-agent-verify-smoke:
    name: proxy-agent-verify-smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Proxy agent verification unit tests
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-agent-verify-unit.xml -- \
            -count=1 ./services/proxy/internal/http/ -run '^TestAgentVerification'
      - name: Upload test results to Trunk (proxy-agent-verify-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-agent-verify-unit.xml
          variant: proxy-agent-verify-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Proxy agent verification integration tests
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          count=$(go test -tags=integration -list '^TestSecurity_SEC[23]_' ./services/proxy | grep -c '^TestSecurity_SEC' || true)
          if [ "$count" -lt 10 ]; then
            echo "expected at least 10 SEC-2/SEC-3 tests, found $count"
            exit 1
          fi
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/proxy-agent-verify-integration.xml -- \
            -tags=integration -count=1 ./services/proxy/ -run '^TestSecurity_SEC[23]_'
      - name: Upload test results to Trunk (proxy-agent-verify-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/proxy-agent-verify-integration.xml
          variant: proxy-agent-verify-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  security-integration:
    name: security-integration
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        env:
          POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Phase 1 security integration suite (M1.5.1)
        env:
          POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
        run: |
          count=$(go test -tags=integration -list '^TestSecurity_' ./services/proxy | grep -c '^TestSecurity_' || true)
          if [ "$count" -lt 28 ]; then
            echo "expected at least 28 TestSecurity_* tests, found $count"
            exit 1
          fi
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/security-integration.xml -- \
            -tags=integration -timeout=120s -count=1 -v ./services/proxy -run '^TestSecurity_'
      - name: Upload test results to Trunk (security-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/security-integration.xml
          variant: security-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  go-race:
    name: go-race
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Race detector (unit tests)
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/go-race.xml -- \
            -race -timeout=120s -count=1 ./packages/... ./services/auth/... ./services/proxy/...
      - name: Upload test results to Trunk (go-race)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/go-race.xml
          variant: go-race
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}

  go-services:
    name: go-services
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, proxy]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: gofmt check
        run: |
          if ! find "services/${{ matrix.service }}" -name '*.go' -print -quit | grep -q .; then
            echo "No Go files found"
            exit 1
          fi
          unformatted="$(find "services/${{ matrix.service }}" -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: go test
        run: |
          bash infra/scripts/go-test-gotestsum.sh "test-results/junit/go-services-${{ matrix.service }}.xml" -- \
            -count=1 ./services/${{ matrix.service }}/...
      - name: Upload test results to Trunk (go-services)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/go-services-${{ matrix.service }}.xml
          variant: go-services-${{ matrix.service }}
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: go build
        run: go build -o /dev/null ./services/${{ matrix.service }}/cmd/${{ matrix.service }}

  golangci-lint:
    name: golangci-lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs for auth
        working-directory: packages/proto
        run: buf generate
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v2.8.0
          golangci-lint --version
      - name: Run golangci-lint
        run: |
          golangci-lint run ./packages/... ./services/auth/... ./services/proxy/...

  trivy:
    name: trivy
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  osv-scan:
    name: osv-scan
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        .

  hadolint:
    name: hadolint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Hadolint all Dockerfiles
        run: |
          # Dockerfiles today: services/auth, services/proxy.
          # Pending: services/memory, services/dashboard (see docs/DEPENDENCIES.md §10).
          mapfile -t files < <(find . -name 'Dockerfile*' -not -path './.git/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Dockerfiles found"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Linting $f"
            docker run --rm -i \
              -v "${GITHUB_WORKSPACE}:/workdir" \
              -w /workdir \
              hadolint/hadolint:v2.12.0 \
              hadolint -f tty --config .hadolint.yaml "$f"
          done

  coverage:
    name: coverage
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_TEST_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
      POSTGRES_MIGRATE_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-gotestsum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate
      - name: Migrate up
        run: go run ./infra/migrations/postgres/cmd/migrate -command up
      - name: Go unit coverage
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/coverage-unit.xml -- \
            -count=1 -coverprofile=coverage-go-unit.out \
            ./packages/... ./services/auth/... ./services/proxy/...
      - name: Upload test results to Trunk (coverage-unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/coverage-unit.xml
          variant: coverage-unit
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Go integration coverage
        run: |
          bash infra/scripts/go-test-gotestsum.sh test-results/junit/coverage-integration.xml -- \
            -tags=integration -count=1 -p 1 -coverprofile=coverage-go-integration.out \
            ./packages/... ./services/auth/... ./services/proxy/... ./infra/...
      - name: Upload test results to Trunk (coverage-integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/trunk-upload-junit
        with:
          junit-paths: test-results/junit/coverage-integration.xml
          variant: coverage-integration
          org-slug: ${{ secrets.TRUNK_ORG_URL_SLUG }}
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      - name: Merge coverage profiles
        run: |
          go run github.com/wadey/gocovmerge@v0.0.0-20160331181800-b5bfa59ec0ad \
            coverage-go-unit.out coverage-go-integration.out > coverage-go-merged.out
          bash infra/scripts/coverage-filter.sh coverage-go-merged.out coverage-go-handwritten.out
          go tool cover -func=coverage-go-handwritten.out | tail -1
      - name: Coverage gate
        run: bash infra/scripts/coverage-gate.sh coverage-go-merged.out
      - name: Upload coverage reports to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-go-handwritten.out,coverage-go-unit.out,coverage-go-integration.out
          flags: go,unit,integration
          fail_ci_if_error: false

  bandit:
    name: bandit
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Bandit (memory service)
        run: |
          if [ ! -d services/memory ]; then
            echo "services/memory not present — skipping bandit until Python memory service lands"
            exit 0
          fi
          pip install bandit
          bandit -r services/memory/ -x tests/,test_ -f sarif -o bandit.sarif
      - name: Upload Bandit SARIF
        if: ${{ hashFiles('bandit.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: bandit.sarif
          category: bandit
