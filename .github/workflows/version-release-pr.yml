name: Version Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: version-release-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  propose-version-release-pr:
    name: propose-version-release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Propose changelog and version bump PR
        id: version_release
        continue-on-error: true
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.VERSION_RELEASE_TOKEN || secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: version-release.config.json
          manifest-file: .version-release-manifest.json

      - name: Report version release PR status
        if: always()
        run: |
          if [ "${{ steps.version_release.outcome }}" = "success" ] && [ "${{ steps.version_release.outputs.prs_created || 'false' }}" = "true" ]; then
            echo "Version release PR created/updated: ${{ steps.version_release.outputs.pr || 'see run logs' }}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Version release PR not created
          The version release workflow completed but did not open a release PR.
          Check that conventional commits exist since the previous release and that workflow permissions allow PR creation.
          EOF
          exit 0
