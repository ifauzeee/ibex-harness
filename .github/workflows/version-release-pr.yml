name: Version Release PR

on:
  schedule:
    # Sunday 08:00 UTC — weekly release PR proposal (not on every main merge)
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: propose = open/update release PR; publish = create tag after release PR merged
        required: true
        default: propose
        type: choice
        options:
          - propose
          - publish
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: version-release-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-release:
    name: version-release
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(release): prepare v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      RELEASE_MODE: ${{ github.event_name == 'schedule' && 'propose' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode) || (github.event_name == 'push' && 'publish') || 'propose' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run version release engine
        id: version_release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.VERSION_RELEASE_TOKEN || github.token }}
          config-file: version-release.config.json
          manifest-file: .version-release-manifest.json

      - name: Resolve version release PR number
        id: release_pr
        if: steps.version_release.outcome == 'success' && env.RELEASE_MODE == 'propose'
        env:
          PR_JSON: ${{ steps.version_release.outputs.pr }}
          PRS_CREATED: ${{ steps.version_release.outputs.prs_created || 'false' }}
          GH_TOKEN: ${{ secrets.VERSION_RELEASE_TOKEN || github.token }}
        run: bash .github/scripts/resolve-version-release-pr-number.sh

      - name: Report semantic-pr-title check on release PR
        if: steps.version_release.outcome == 'success' && env.RELEASE_MODE == 'propose' && steps.release_pr.outputs.resolved == 'true'
        env:
          GH_TOKEN: ${{ secrets.VERSION_RELEASE_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
        run: bash .github/scripts/report-semantic-pr-title-check.sh "$PR_NUMBER"

      - name: Publish version release report
        if: always()
        env:
          VERSION_RELEASE_STEP_OUTCOME: ${{ steps.version_release.outcome }}
          VERSION_RELEASE_PRS_CREATED: ${{ steps.version_release.outputs.prs_created || 'false' }}
          VERSION_RELEASE_PR_NUMBER: ${{ steps.release_pr.outputs.number || '' }}
          VERSION_RELEASE_RELEASES_CREATED: ${{ steps.version_release.outputs.releases_created || 'false' }}
          VERSION_RELEASE_TAG_NAME: ${{ steps.version_release.outputs.tag_name || '' }}
        run: |
          bash .github/scripts/publish-version-release-report.sh \
            "$VERSION_RELEASE_STEP_OUTCOME" \
            "$VERSION_RELEASE_PRS_CREATED" \
            "$VERSION_RELEASE_PR_NUMBER" \
            "$VERSION_RELEASE_RELEASES_CREATED" \
            "$VERSION_RELEASE_TAG_NAME"
