name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      force_full:
        description: Run analysis regardless of path filters
        required: false
        default: false
        type: boolean

# SonarQube S8264: declare permissions per job, not at workflow scope.
permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_go: ${{ steps.detect.outputs.run_go }}
      run_security: ${{ steps.detect.outputs.run_security }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ github.event_name == 'push' && '2' || '0' }}
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-changes
        with:
          fetch-depth: ${{ github.event_name == 'push' && '2' || '0' }}
          force-full: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_full == true) }}

  analyze:
    name: CodeQL
    needs: changes
    if: |
      github.event_name == 'schedule' ||
      needs.changes.outputs.run_go == 'true' ||
      needs.changes.outputs.run_security == 'true'
    permissions:
      security-events: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Python/JS added when services/memory and services/dashboard exist (ADR-0008).
        language: [go]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/setup-buf

      - name: Generate protobuf stubs for CodeQL
        working-directory: packages/proto
        run: buf generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:${{ matrix.language }}
