name: Tagged Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to attach SBOM assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: tagged-release-${{ github.workflow }}-${{ github.event.inputs.tag_name || github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  tagged-github-release:
    name: tagged-github-release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_tag.outputs.value }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${EVENT_TAG:-$REF_NAME}}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid tag::Expected semver tag like v0.1.0, got '${tag}'"
            exit 1
          fi
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq .ref >/dev/null 2>&1; then
            echo "::error title=Tag not found::Tag '${tag}' does not exist. Existing tags: $(gh api "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v" --jq '.[].ref' | sed 's|refs/tags/||' | tr '\n' ' ')"
            exit 1
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-tags: true
          ref: ${{ steps.release_tag.outputs.value }}

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOM with Sigstore (keyless)
        run: |
          set -euo pipefail
          # Cosign v3+ defaults to the new bundle format; --output-signature is ignored.
          # Scorecard Signed-Releases accepts *.sigstore (among other suffixes).
          cosign sign-blob --yes sbom.spdx.json \
            --bundle sbom.spdx.json.sigstore
          test -f sbom.spdx.json
          test -f sbom.spdx.json.sigstore
          ls -la sbom.spdx.json*

      - name: Upload SBOM assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            sbom.spdx.json \
            sbom.spdx.json.sigstore \
            --clobber

      - name: Publish tagged release summary
        if: success()
        run: |
          {
            echo "## Tagged release ${RELEASE_TAG}"
            echo ""
            echo "| Asset | Purpose |"
            echo "| --- | --- |"
            echo "| \`sbom.spdx.json\` | SPDX SBOM (Syft) |"
            echo "| \`sbom.spdx.json.sigstore\` | Cosign/Sigstore verification bundle |"
            echo ""
            echo "Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          } >>"$GITHUB_STEP_SUMMARY"
          echo "::notice title=Tagged release published::${RELEASE_TAG} with signed SBOM assets"
