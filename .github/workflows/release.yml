name: Tagged Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: tagged-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tagged-github-release:
    name: tagged-github-release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOM with Sigstore (keyless)
        run: |
          cosign sign-blob --yes sbom.spdx.json \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.pem
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  tagged-docker-publish:
    name: tagged-docker-publish
    needs: tagged-github-release
    permissions:
      packages: write
      id-token: write
      attestations: write
      security-events: write
      contents: read
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_tag: ${{ github.ref_name }}
