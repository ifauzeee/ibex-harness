name: Tagged Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to attach SBOM assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: tagged-release-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  tagged-github-release:
    name: tagged-github-release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref }}

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOM with Sigstore (keyless)
        run: |
          cosign sign-blob --yes sbom.spdx.json \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem

      - name: Upload SBOM assets to GitHub Release
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" \
            sbom.spdx.json \
            sbom.spdx.json.sig \
            sbom.spdx.json.pem \
            --clobber

      - name: Publish tagged release summary
        if: success()
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref_name }}
        run: |
          {
            echo "## Tagged release ${TAG_NAME}"
            echo ""
            echo "| Asset | Purpose |"
            echo "| --- | --- |"
            echo "| \`sbom.spdx.json\` | SPDX SBOM (Syft) |"
            echo "| \`sbom.spdx.json.sig\` | cosign signature |"
            echo "| \`sbom.spdx.json.pem\` | Sigstore certificate |"
            echo ""
            echo "Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          } >>"$GITHUB_STEP_SUMMARY"
          echo "::notice title=Tagged release published::${TAG_NAME} with signed SBOM assets"

  tagged-docker-publish:
    name: tagged-docker-publish
    needs: tagged-github-release
    permissions:
      packages: write
      id-token: write
      attestations: write
      security-events: write
      contents: read
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_tag: ${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref_name }}
