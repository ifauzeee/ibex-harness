name: Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - ".npmrc"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/docs-deploy.yml"
      - ".github/actions/setup-pnpm-docs/**"
      - ".github/scripts/docs-smoke.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-docs-pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://docs.ibexharness.com
    env:
      NEXT_PUBLIC_SITE_URL: https://docs.ibexharness.com
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm-docs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: docs/app/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'docs/app/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Typecheck docs app
        run: pnpm --filter docs typecheck

      - name: Test docs components
        run: pnpm --filter docs test

      - name: Build docs (static export)
        run: pnpm --filter docs build:clean

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler pages project create ibex-harness-docs --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        id: deploy
        timeout-minutes: 15
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler pages deploy docs/app/out \
            --project-name=ibex-harness-docs \
            --branch=${{ github.ref_name }} \
            --commit-dirty=true 2>&1 | tee deploy.log
          BASE_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' deploy.log | tail -1)
          if [ -z "$BASE_URL" ]; then
            echo "Could not parse pages.dev URL from deploy output"
            exit 1
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed Pages preview
        run: bash "$GITHUB_WORKSPACE/.github/scripts/docs-smoke.sh" "${{ steps.deploy.outputs.base_url }}"

      # Production still points at the legacy Worker until DNS is moved to Pages.
      - name: Smoke test production domain (post-DNS cutover)
        continue-on-error: true
        run: bash "$GITHUB_WORKSPACE/.github/scripts/docs-smoke.sh" "https://docs.ibexharness.com"
