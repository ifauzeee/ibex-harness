name: Nightly CI

# Weekly full CI dispatch — triggers ci.yml via workflow_dispatch on main.
# ci.yml uses event-scoped concurrency so this dispatch does not cancel push runs.
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  dispatch-full-ci:
    name: dispatch-full-ci
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Trigger CI workflow on main
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: {
                force_full: true,
              },
            });
