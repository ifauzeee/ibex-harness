name: Benchmarks

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/benchmark.yml"
      - "benchmarks/**"
      - "packages/**"
      - "services/auth/**"
      - "services/proxy/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-benchmark-pipeline:
    name: verify-benchmark-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run Go benchmark pipeline unit tests
        run: go test ./benchmarks/go/...

      - name: Run Python benchmark pipeline unit tests
        run: python benchmarks/scripts/test_pipeline.py

  collect-proxy-benchmarks:
    name: collect-proxy-benchmarks
    needs: verify-benchmark-pipeline
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      BENCH_PROXY_PORT: "18082"
      POSTGRES_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
      REDIS_URL: redis://127.0.0.1:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: setup_go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: ./.github/actions/setup-buf

      - name: Record overlap policy
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Concurrency policy
          - This workflow uses `cancel-in-progress: true` to avoid benchmark noise from overlapping runs.
          - If another run for this ref starts, the older run is canceled by design.
          EOF

      - name: Prepare output directories
        run: |
          mkdir -p benchmarks/output
          mkdir -p benchmarks/output/site/data

      - name: Pull previous benchmark data from live dashboard
        run: |
          prev_url="https://${{ github.repository_owner }}.github.io/ibex-harness/data/runs.json"
          if curl -fsS "$prev_url" -o benchmarks/output/prev-runs.json; then
            echo "Loaded previous runs from ${prev_url}"
          else
            echo "No live dashboard yet; starting fresh history."
            echo '{"runs":[]}' > benchmarks/output/prev-runs.json
          fi
          prev_bench_url="https://${{ github.repository_owner }}.github.io/ibex-harness/data/latest-go-bench.txt"
          if curl -fsS "$prev_bench_url" -o benchmarks/output/prev-go-bench.txt; then
            echo "Loaded previous go bench text from ${prev_bench_url}"
          fi

      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate

      - name: Migrate database for benchmark proxy stack
        env:
          POSTGRES_MIGRATE_DSN: ${{ env.POSTGRES_DSN }}
        run: go run ./infra/migrations/postgres/cmd/migrate -command up

      - name: Start real proxy stack for load benchmark
        run: bash benchmarks/scripts/start_proxy_stack.sh

      - name: Run Go microbenchmarks
        run: |
          go test ./benchmarks/go -run=^$ -bench=. -benchmem -count=5 > benchmarks/output/go-bench.txt
          go test ./services/proxy/internal/http -run=^$ -bench=BenchmarkProxy -benchmem -count=5 >> benchmarks/output/go-bench.txt

      - name: Compare against previous benchmark with benchstat
        run: bash benchmarks/scripts/benchstat_compare.sh

      - name: Run k6 load benchmark against proxy /health
        run: |
          chmod -R a+rwX benchmarks/output
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --network host \
            -v "$PWD:/work" -w /work \
            -e BASE_URL="http://127.0.0.1:${BENCH_PROXY_PORT}" \
            -e K6_HEALTH_PATH=/health \
            grafana/k6:0.53.0 \
            run benchmarks/k6/proxy_load.js \
            --summary-trend-stats="med,p(90),p(95),p(99),p(99.9),min,max" \
            --summary-export benchmarks/output/k6-summary.json

      - name: Collect benchmark artifacts into schema
        env:
          GO_VERSION: ${{ steps.setup_go.outputs.go-version }}
        run: |
          python benchmarks/scripts/aggregate_metrics.py > benchmarks/output/collector-summary.json
          cp benchmarks/output/go-bench.txt benchmarks/output/site/data/latest-go-bench.txt
          cp benchmarks/output/benchstat.txt benchmarks/output/site/data/benchstat.txt

      - name: Build dashboard pages and data
        run: python benchmarks/scripts/build_site.py

      - name: Run regression gates
        run: |
          set +e
          python benchmarks/scripts/regression_gate.py | tee benchmarks/output/gate-summary.md
          status=$?
          set -e
          cat benchmarks/output/gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Verify publish payload is complete
        run: |
          test -f benchmarks/output/site/index.html
          test -f benchmarks/output/site/trends.html
          test -f benchmarks/output/site/waterfall.html
          test -f benchmarks/output/site/load.html
          test -f benchmarks/output/site/commits.html
          test -f benchmarks/output/site/data/runs.json
          test -f benchmarks/output/site/data/baseline.json
          test -f benchmarks/output/site/data/metadata.json

      - name: Stop proxy stack
        if: always()
        run: bash benchmarks/scripts/stop_proxy_stack.sh

      - name: Upload benchmark site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-marks-site
          path: benchmarks/output/site/
          if-no-files-found: error

  publish-bench-marks-gh-pages:
    name: publish-bench-marks-gh-pages
    needs: collect-proxy-benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: benchmark-gh-pages-publish
      cancel-in-progress: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download benchmark site artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bench-marks-site
          path: benchmarks/output/site

      - name: Verify publish payload is complete
        run: |
          test -f benchmarks/output/site/index.html
          test -f benchmarks/output/site/.nojekyll
          test -f benchmarks/output/site/data/runs.json
          test -f benchmarks/output/site/data/baseline.json
          test -f benchmarks/output/site/data/metadata.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: benchmarks/output/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Final bench-marks URL summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Benchmark dashboard URLs
          - Root: https://${{ github.repository_owner }}.github.io/ibex-harness/
          - Overview: https://${{ github.repository_owner }}.github.io/ibex-harness/index.html
          - Trends: https://${{ github.repository_owner }}.github.io/ibex-harness/trends.html
          - Waterfall: https://${{ github.repository_owner }}.github.io/ibex-harness/waterfall.html
          - Load: https://${{ github.repository_owner }}.github.io/ibex-harness/load.html
          - Commits: https://${{ github.repository_owner }}.github.io/ibex-harness/commits.html
          EOF
