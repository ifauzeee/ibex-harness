name: Benchmarks

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/benchmark.yml"
      - "benchmarks/**"
      - "packages/**"
      - "services/auth/**"
      - "services/proxy/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-and-publish:
    name: benchmark
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: setup_go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Record overlap policy
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Concurrency policy
          - This workflow uses `cancel-in-progress: true` to avoid benchmark noise from overlapping runs.
          - If another run for this ref starts, the older run is canceled by design.
          EOF

      - name: Prepare output directories
        run: |
          mkdir -p benchmarks/output
          mkdir -p benchmarks/output/site/data

      - name: Pull previous benchmark data from gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          original_origin="$(git remote get-url origin)"
          trap 'git remote set-url origin "$original_origin"' EXIT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
            git worktree add /tmp/bench-gh-pages gh-pages
            if [ -f /tmp/bench-gh-pages/data/runs.json ]; then cp /tmp/bench-gh-pages/data/runs.json benchmarks/output/prev-runs.json; fi
            if [ -f /tmp/bench-gh-pages/data/metadata.json ]; then cp /tmp/bench-gh-pages/data/metadata.json benchmarks/output/prev-metadata.json; fi
            if [ -f /tmp/bench-gh-pages/data/latest-go-bench.txt ]; then cp /tmp/bench-gh-pages/data/latest-go-bench.txt benchmarks/output/prev-go-bench.txt; fi
            git worktree remove /tmp/bench-gh-pages --force
          else
            echo "No gh-pages branch detected yet. First run bootstrap."
          fi

      - name: Run Go microbenchmarks
        run: |
          go test ./benchmarks/go -run=^$ -bench=. -benchmem -count=5 > benchmarks/output/go-bench.txt

      - name: Compare against previous benchmark with benchstat
        run: |
          bash benchmarks/scripts/benchstat_compare.sh

      - name: Start local HTTP target for k6
        run: |
          python -m http.server 18082 --directory . >/tmp/bench-http.log 2>&1 &
          echo $! > /tmp/bench-http.pid
          printf "ok\n" > ./healthz
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18082/healthz >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/bench-http.log >&2
          exit 1

      - name: Run k6 load benchmark
        run: |
          docker run --rm \
            --network host \
            -v "$PWD:/work" -w /work \
            grafana/k6:0.53.0 \
            run benchmarks/k6/proxy_load.js --summary-export benchmarks/output/k6-summary.json

      - name: Collect benchmark artifacts into schema
        env:
          GO_VERSION: ${{ steps.setup_go.outputs.go-version }}
        run: |
          python benchmarks/scripts/aggregate_metrics.py > benchmarks/output/collector-summary.json
          cp benchmarks/output/go-bench.txt benchmarks/output/site/data/latest-go-bench.txt
          cp benchmarks/output/benchstat.txt benchmarks/output/site/data/benchstat.txt

      - name: Build dashboard pages and data
        run: |
          python benchmarks/scripts/build_site.py

      - name: Run regression gates
        run: |
          set +e
          python benchmarks/scripts/regression_gate.py | tee benchmarks/output/gate-summary.md
          status=$?
          set -e
          cat benchmarks/output/gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Verify publish payload is complete
        run: |
          test -f benchmarks/output/site/index.html
          test -f benchmarks/output/site/trends.html
          test -f benchmarks/output/site/waterfall.html
          test -f benchmarks/output/site/load.html
          test -f benchmarks/output/site/commits.html
          test -f benchmarks/output/site/data/runs.json
          test -f benchmarks/output/site/data/baseline.json
          test -f benchmarks/output/site/data/metadata.json

      - name: Publish dashboard to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$(mktemp -d)"
          cp -R benchmarks/output/site/. "${publish_dir}/"
          original_origin="$(git remote get-url origin)"
          trap 'git remote set-url origin "$original_origin"' EXIT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
            git worktree add /tmp/bench-publish gh-pages
          else
            git worktree add --detach /tmp/bench-publish
            (
              cd /tmp/bench-publish
              git checkout --orphan gh-pages
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          find /tmp/bench-publish -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +
          cp -R "${publish_dir}/." /tmp/bench-publish/

          cd /tmp/bench-publish
          git add .
          if git diff --cached --quiet; then
            echo "No benchmark site changes to publish."
            cd - >/dev/null
            git worktree remove /tmp/bench-publish --force
            exit 0
          fi
          git -c user.name=github-actions -c user.email=github-actions@users.noreply.github.com \
            commit -m "chore(bench): publish benchmark dashboard for ${GITHUB_SHA}"
          git push origin gh-pages
          cd - >/dev/null
          git worktree remove /tmp/bench-publish --force

      - name: Final URL summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Benchmark dashboard URLs
          - Root: https://${{ github.repository_owner }}.github.io/ibex-harness/
          - Overview: https://${{ github.repository_owner }}.github.io/ibex-harness/index.html
          - Trends: https://${{ github.repository_owner }}.github.io/ibex-harness/trends.html
          - Waterfall: https://${{ github.repository_owner }}.github.io/ibex-harness/waterfall.html
          - Load: https://${{ github.repository_owner }}.github.io/ibex-harness/load.html
          - Commits: https://${{ github.repository_owner }}.github.io/ibex-harness/commits.html
          EOF

      - name: Stop local HTTP target
        if: always()
        run: |
          if [ -f /tmp/bench-http.pid ]; then
            kill "$(cat /tmp/bench-http.pid)" || true
          fi
