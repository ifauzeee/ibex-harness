name: Benchmarks

# Cross-repo publish: ibexharness-benchmark-bot (pinned via BENCHMARK_BOT_SHA).
on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/benchmark.yml"
      - "benchmarks/**"
      - "packages/**"
      - "services/auth/**"
      - "services/proxy/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/benchmark.yml"
      - "benchmarks/**"
      - "packages/**"
      - "services/auth/**"
      - "services/proxy/**"
      - "go.mod"
      - "go.sum"

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-benchmark-trigger:
    name: detect-benchmark-trigger
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_benchmarks: ${{ steps.decide.outputs.run_benchmarks }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Decide whether to run benchmarks
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_benchmarks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          patterns='^\.github/workflows/benchmark\.yml$|^benchmarks/|^packages/|^services/auth/|^services/proxy/|^go\.mod$|^go\.sum$'
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            range='HEAD~1..HEAD'
          else
            echo "run_benchmarks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$range" | grep -E "$patterns" >/dev/null; then
            echo "run_benchmarks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_benchmarks=false" >> "$GITHUB_OUTPUT"
          fi

  verify-benchmark-pipeline:
    name: verify-benchmark-pipeline
    needs: detect-benchmark-trigger
    if: needs.detect-benchmark-trigger.outputs.run_benchmarks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run Go benchmark pipeline unit tests
        run: go test ./benchmarks/go/...

      - name: Run Python benchmark pipeline unit tests
        run: python benchmarks/scripts/test_pipeline.py

      - name: Validate published benchmark data on main
        run: |
          path="docs/app/public/benchmarks/benchmark-data.json"
          if [ -f "$path" ]; then
            python benchmarks/scripts/validate_published_data.py "$path"
          else
            echo "No published benchmark data yet; skipping validation."
          fi

  collect-proxy-benchmarks:
    name: collect-proxy-benchmarks
    needs: verify-benchmark-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      BENCH_PROXY_PORT: "18082"
      POSTGRES_DSN: postgres://ibex:ibex@localhost:5432/ibex?sslmode=disable
      REDIS_URL: redis://127.0.0.1:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibex
          POSTGRES_PASSWORD: ibex
          POSTGRES_DB: ibex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibex -d ibex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: setup_go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: ./.github/actions/setup-buf

      - name: Record overlap policy
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Concurrency policy
          - This workflow uses `cancel-in-progress: true` to avoid benchmark noise from overlapping runs.
          - If another run for this ref starts, the older run is canceled by design.
          EOF

      - name: Prepare output directories
        run: mkdir -p benchmarks/output

      - name: Load previous benchmark history from repo
        run: |
          src="docs/app/public/benchmarks/benchmark-data.json"
          if [ -f "$src" ]; then
            cp "$src" benchmarks/output/prev-benchmark-data.json
            echo "Loaded previous benchmark history from ${src}"
          else
            echo '{"schema_version":1,"baseline_sha":"","runs":[]}' > benchmarks/output/prev-benchmark-data.json
            echo "No published benchmark history yet; starting fresh."
          fi

      - name: Generate protobuf stubs
        working-directory: packages/proto
        run: buf generate

      - name: Migrate database for benchmark proxy stack
        env:
          POSTGRES_MIGRATE_DSN: ${{ env.POSTGRES_DSN }}
        run: go run ./infra/migrations/postgres/cmd/migrate -command up

      - name: Start real proxy stack for load benchmark
        run: bash benchmarks/scripts/start_proxy_stack.sh

      - name: Run Go microbenchmarks
        run: |
          go test ./benchmarks/go -run=^$ -bench=. -benchmem -count=5 > benchmarks/output/go-bench.txt
          go test ./services/proxy/internal/http -run=^$ -bench=BenchmarkProxy -benchmem -count=5 >> benchmarks/output/go-bench.txt

      - name: Compare against previous benchmark with benchstat
        run: bash benchmarks/scripts/benchstat_compare.sh

      - name: Run k6 load benchmark against proxy /health
        run: |
          chmod -R a+rwX benchmarks/output
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --network host \
            -v "$PWD:/work" -w /work \
            -e BASE_URL="http://127.0.0.1:${BENCH_PROXY_PORT}" \
            -e K6_HEALTH_PATH=/health \
            grafana/k6:0.53.0 \
            run benchmarks/k6/proxy_load.js \
            --summary-trend-stats="med,p(90),p(95),p(99),p(99.9),min,max" \
            --summary-export benchmarks/output/k6-summary.json

      - name: Collect benchmark artifacts into schema
        env:
          GO_VERSION: ${{ steps.setup_go.outputs.go-version }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: python benchmarks/scripts/aggregate_metrics.py > benchmarks/output/collector-summary.json

      - name: Run regression gates
        run: |
          set +e
          python benchmarks/scripts/regression_gate.py | tee benchmarks/output/gate-summary.md
          status=${PIPESTATUS[0]}
          cat benchmarks/output/gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          set -e
          python benchmarks/scripts/build_benchmark_data.py
          python benchmarks/scripts/generate_badge.py

      - name: Verify benchmark data payload
        run: |
          test -f benchmarks/output/benchmark-data.json
          test -f benchmarks/output/badge.svg
          test -f benchmarks/output/gate-result.json
          python benchmarks/scripts/validate_published_data.py benchmarks/output/benchmark-data.json

      - name: Require benchmark bot pin
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          BENCHMARK_BOT_SHA: ${{ vars.BENCHMARK_BOT_SHA }}
        run: test -n "$BENCHMARK_BOT_SHA"

      - name: Require benchmark bot App credentials
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          APP_ID: ${{ secrets.BENCHMARK_BOT_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.BENCHMARK_BOT_APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.BENCHMARK_BOT_INSTALLATION_ID }}
        run: |
          test -n "$APP_ID" && test -n "$APP_PRIVATE_KEY" && test -n "$INSTALLATION_ID"

      - name: Checkout benchmark bot
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Rick1330/ibexharness-benchmark-bot
          ref: ${{ vars.BENCHMARK_BOT_SHA }}
          path: benchmark-bot
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.2
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          workspaces: benchmark-bot

      - name: Build and post PR benchmark comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          APP_ID: ${{ secrets.BENCHMARK_BOT_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.BENCHMARK_BOT_APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.BENCHMARK_BOT_INSTALLATION_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BENCHMARK_DATA_PATH: ${{ github.workspace }}/benchmarks/output/benchmark-data.json
          GATE_RESULT_PATH: ${{ github.workspace }}/benchmarks/output/gate-result.json
        run: |
          set -euo pipefail
          cd benchmark-bot
          cargo build --release
          ./target/release/ibex-benchmark-bot post-pr-comment \
            --benchmark-data "$BENCHMARK_DATA_PATH" \
            --gate-result "$GATE_RESULT_PATH"

      - name: Stop proxy stack
        if: always()
        run: bash benchmarks/scripts/stop_proxy_stack.sh

      - name: Upload benchmark data artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-data
          path: |
            benchmarks/output/benchmark-data.json
            benchmarks/output/badge.svg
            benchmarks/output/gate-summary.md
            benchmarks/output/gate-result.json
          if-no-files-found: error

  verify-published-benchmark-data:
    name: verify-published-benchmark-data
    needs: collect-proxy-benchmarks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base ref for integrity diff
        env:
          GH_TOKEN: ${{ github.token }}
          BENCHMARK_BASE_REF: ${{ github.base_ref }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "${BENCHMARK_BASE_REF}"

      - name: Download benchmark data artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: benchmark-data
          path: benchmarks/output

      - name: Validate workflow benchmark artifact
        run: python benchmarks/scripts/validate_published_data.py benchmarks/output/benchmark-data.json

      - name: Reject manual benchmark JSON edits on PR branches
        env:
          BENCHMARK_BASE_REF: ${{ github.base_ref }}
          BENCHMARK_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash benchmarks/scripts/verify_pr_benchmark_integrity.sh "$BENCHMARK_BASE_REF"

  notify-benchmark-bot:
    name: notify-benchmark-bot
    needs: collect-proxy-benchmarks
    if: |
      vars.BENCHMARK_BOT_ENABLED == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Validate dispatch prerequisites
        env:
          DISPATCH_TOKEN: ${{ secrets.BENCHMARK_BOT_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "BENCHMARK_BOT_DISPATCH_TOKEN is required when BENCHMARK_BOT_ENABLED=true" >&2
            exit 1
          fi

      - name: Dispatch benchmark publish to bot repo
        env:
          GH_TOKEN: ${{ secrets.BENCHMARK_BOT_DISPATCH_TOKEN }}
          DISPATCH_RUN_ID: ${{ github.run_id }}
          DISPATCH_HEAD_SHA: ${{ github.sha }}
          DISPATCH_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          gh api repos/Rick1330/ibexharness-benchmark-bot/dispatches \
            -f event_type=benchmark_main_complete \
            -f "client_payload[run_id]=${DISPATCH_RUN_ID}" \
            -f "client_payload[head_sha]=${DISPATCH_HEAD_SHA}" \
            -f "client_payload[run_number]=${DISPATCH_RUN_NUMBER}"

  record-fork-pr-benchmark:
    name: record-fork-pr-benchmark
    needs: collect-proxy-benchmarks
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Note fork PR publish limitation
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Benchmark publish skipped
          Fork PRs cannot receive automated benchmark-data commits.
          Download the `benchmark-data` artifact from this workflow run for preview and review.
          Docs CI overlays the artifact on pull requests when a successful Benchmarks run exists.
          EOF
