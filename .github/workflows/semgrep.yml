name: Semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.103.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run IBEX custom rules (hard gate)
        run: |
          semgrep scan \
            --config .semgrep/rules/ \
            --error \
            services/ packages/

      - name: Run community rules (SARIF only)
        run: |
          semgrep scan \
            --config p/golang \
            --config p/python \
            --config p/typescript \
            --config p/owasp-top-ten \
            --exclude-rule go.grpc.security.grpc-server-insecure-connection \
            --sarif --sarif-output=semgrep.sarif \
            services/ packages/

      - name: Ensure SARIF exists
        run: |
          if [ ! -f semgrep.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
