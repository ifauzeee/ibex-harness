name: Semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.103.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run IBEX custom rules (hard gate)
        run: |
          semgrep scan \
            --config .semgrep/rules/ \
            --error \
            services/ packages/

      - name: Run community rules (SARIF only)
        run: |
          semgrep scan \
            --config p/golang \
            --config p/python \
            --config p/typescript \
            --config p/owasp-top-ten \
            --sarif --sarif-output=semgrep.sarif \
            services/ packages/

      - name: Ensure SARIF exists
        run: |
          if [ ! -f semgrep.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
