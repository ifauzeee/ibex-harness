name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# SonarQube S8264: declare permissions per job, not at workflow scope.
permissions: {}

jobs:
  label:
    name: label-pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
