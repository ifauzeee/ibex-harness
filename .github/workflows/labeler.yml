name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# SonarQube S8264: declare permissions per job, not at workflow scope.
permissions: {}

jobs:
  label:
    name: label-pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
