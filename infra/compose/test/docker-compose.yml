# Minimal stack for future integration tests (Postgres + Redis only).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ibex
      POSTGRES_PASSWORD: ibex
      POSTGRES_DB: ibex_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibex -d ibex_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:7.4.0-v1
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
