version: v2
# Code generation is not run in CI. See README.md and ADR-0004.
# Run locally after installing buf: buf generate
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/python
    out: gen/python
  - remote: buf.build/bufbuild/es
    out: gen/typescript
